version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: "monthly"
      timezone: Europe/Berlin
    open-pull-requests-limit: 15
    assignees:
      - phoeluga
    versioning-strategy: increase

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: "monthly"
      timezone: Europe/Berlin
    open-pull-requests-limit: 15
    assignees:
      - phoeluga
