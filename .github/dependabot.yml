version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: "cron"
      cron: "5 2 7 * *"
      timezone: Europe/Berlin
    open-pull-requests-limit: 15
    assignees:
      - phoeluga
    versioning-strategy: increase

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: "cron"
      cron: "15 3 19 * *"
      timezone: Europe/Berlin
    open-pull-requests-limit: 15
    assignees:
      - phoeluga
